<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <defs>
    <!-- Metallic Gradient -->
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="35%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#9CA3AF"/>
      <stop offset="55%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    
    <!-- Cut Paths to create a sliced effect -->
    <clipPath id="cut-top">
      <polygon points="0,0 400,0 400,48 0,56" />
    </clipPath>
    <clipPath id="cut-bottom">
      <polygon points="0,58 400,50 400,100 0,100" />
    </clipPath>
  </defs>

  <!-- Top Half (Sliced) -->
  <g transform="translate(-2, -1)">
    <text 
      x="50%" 
      y="65" 
      text-anchor="middle" 
      font-family="'Inter', 'Arial Black', sans-serif" 
      font-weight="900" 
      font-size="52" 
      letter-spacing="6" 
      fill="url(#metal)" 
      clip-path="url(#cut-top)"
    >
      ONESPACE
    </text>
  </g>

  <!-- Bottom Half (Sliced) -->
  <g transform="translate(2, 1)">
    <text 
      x="50%" 
      y="65" 
      text-anchor="middle" 
      font-family="'Inter', 'Arial Black', sans-serif" 
      font-weight="900" 
      font-size="52" 
      letter-spacing="6" 
      fill="url(#metal)" 
      clip-path="url(#cut-bottom)"
    >
      ONESPACE
    </text>
  </g>
</svg>
